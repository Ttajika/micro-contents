<!-- ===== 静的レイアウト ===== -->
<line x1="275" y1="78" x2="275" y2="430" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

<!-- 左：就活生 -->
<text x="34" y="46" fill="#333" font-size="16" font-weight="700">就活生</text>
<text x="34" y="64" fill="#888" font-size="11">（名前：希望順）</text>
<text x="34" y="116" fill="#333" font-size="15">アダム：<tspan x="112" text-anchor="middle">A</tspan><tspan x="134" text-anchor="middle">B</tspan><tspan x="156" text-anchor="middle">C</tspan></text>
<text x="34" y="159" fill="#333" font-size="15">イヴ：<tspan x="112" text-anchor="middle">B</tspan><tspan x="134" text-anchor="middle">A</tspan><tspan x="156" text-anchor="middle">C</tspan></text>
<text x="34" y="202" fill="#333" font-size="15">ノア：<tspan x="112" text-anchor="middle">A</tspan><tspan x="134" text-anchor="middle">B</tspan><tspan x="156" text-anchor="middle">C</tspan></text>

<!-- 凡例 -->
<circle cx="312" cy="62" r="7" fill="none" stroke="#1a3c6e" stroke-width="2" stroke-dasharray="3,2"/>
<text x="324" y="66" fill="#555" font-size="11">暫定保留</text>
<circle cx="402" cy="62" r="7" fill="none" stroke="#2a8a3e" stroke-width="2"/>
<text x="414" y="66" fill="#555" font-size="11">確定</text>
