<text x="490" y="66" fill="#555" font-size="11">不採用</text>
<line x1="538" y1="62" x2="556" y2="62" stroke="#c0392b" stroke-width="2.5"/>
<text x="560" y="66" fill="#555" font-size="11">もう行けない</text>

<!-- 企業ヘッダー -->
<text x="300" y="46" fill="#333" font-size="16" font-weight="700">企業（名前：好み）</text>
<rect x="345" y="80" width="70" height="44" rx="8" fill="#f5f1ec" stroke="#ddd" stroke-width="1"/>
<text x="380" y="102" text-anchor="middle" fill="#333" font-size="18" font-weight="700">A</text>
<text x="380" y="119" text-anchor="middle" fill="#666" font-size="12">アイノ</text>
<rect x="475" y="80" width="70" height="44" rx="8" fill="#f5f1ec" stroke="#ddd" stroke-width="1"/>
<text x="510" y="102" text-anchor="middle" fill="#333" font-size="18" font-weight="700">B</text>
<text x="510" y="119" text-anchor="middle" fill="#666" font-size="12">ノイア</text>
<rect x="605" y="80" width="70" height="44" rx="8" fill="#f5f1ec" stroke="#ddd" stroke-width="1"/>
<text x="640" y="102" text-anchor="middle" fill="#333" font-size="18" font-weight="700">C</text>
<text x="640" y="119" text-anchor="middle" fill="#666" font-size="12">イノア</text>

<!-- 巡目ラベルと帯の区切り -->
