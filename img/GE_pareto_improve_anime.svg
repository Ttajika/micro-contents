<text x="94.0" y="207.6" font-size="11.5" font-weight="700" fill="#c0392b" text-anchor="start" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.2400;0.2480;1.0000;1.0000;1" values="0;0;1;1;1;1"/>ケネスの無差別曲線</text>
<circle cx="324.0" cy="352.0" r="5" fill="#d9822b" stroke="#fff" stroke-width="1.6" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.1200;0.1280;1.0000;1.0000;1" values="0;0;1;1;1;1"/></circle>
<text x="332.0" y="368.0" font-size="12" font-weight="700" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.1200;0.1280;1.0000;1.0000;1" values="0;0;1;1;1;1"/>いまの配分</text>
<defs><marker id="ahg" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1f7a45"/></marker></defs>
<line x1="324.0" y1="352.0" x2="246.0" y2="293.5" stroke="#1f7a45" stroke-width="2.6" marker-end="url(#ahg)" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.8200;0.8280;1.0000;1.0000;1" values="0;0;1;1;1;1"/></line>
<rect x="24" y="476" width="552" height="64" rx="8" fill="#eef3f9" stroke="#dde3eb"/>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.0000;0.0080;0.1200;0.1280;1" values="0;0;1;1;0;0"/>エッジワースボックス：箱の中の一点が，二人への財の分け方（配分）を表す</text>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.1200;0.1280;0.2400;0.2480;1" values="0;0;1;1;0;0"/>いまの配分はこの点．ここから二人の効用を考える</text>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.2400;0.2480;0.4000;0.4080;1" values="0;0;1;1;0;0"/>配分を通る無差別曲線を二人ぶん描く（青＝レオン，赤＝ケネス）</text>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.4000;0.4080;0.5400;0.5480;1" values="0;0;1;1;0;0"/>二本の無差別曲線が交差している（接していない）</text>
<text x="300" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.4000;0.4080;0.5400;0.5480;1" values="0;0;1;1;0;0"/>→ じつはまだ改善の余地がある</text>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.5400;0.5480;0.6800;0.6880;1" values="0;0;1;1;0;0"/>レオンの効用を上げるには，青い領域（無差別曲線より右上）へ動かす必要がある</text>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.6800;0.6880;0.8200;0.8280;1" values="0;0;1;1;0;0"/>ケネスの効用を上げるには，赤い領域（無差別曲線より左下）へ動かす必要がある</text>
<text x="300" y="500" text-anchor="middle" font-size="13" fill="#333" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.8200;0.8280;1.0000;1.0000;1" values="0;0;1;1;0;0"/>二つが重なる緑の領域へ配分を動かせば，二人とも効用が上がる</text>
<text x="300" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#1f7a45" opacity="0"><animate attributeName="opacity" dur="30s" repeatCount="indefinite" keyTimes="0;0.8200;0.8280;1.0000;1.0000;1" values="0;0;1;1;0;0"/>＝ パレート改善ができる</text>
</svg>