<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif">

<rect x="0" y="0" width="600" height="540" fill="#fafbfc"/>

<rect x="30" y="14" width="540" height="56" rx="8" fill="#eef3f9" stroke="#dde3eb" stroke-width="1"/>

<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="1;0;0;0;0;0"/>
  予算線：所得 m で買える (x, y) の組み合わせ
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;1;0;0;0;0"/>
  無差別曲線：同じ効用 u を与える (x, y)．交点で予算内に達成可能
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;0;1;0;0;0"/>
  右上にずらすと効用が上がる（まだ交点があり予算内で達成可）
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;0;0;1;0;0"/>
  上げすぎ：無差別曲線が予算線と交わらず この効用は達成できない
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;0;0;0;1;1"/>
  接点に戻る．ここで効用が最大になる（効用最大化点）
</text>

<g stroke="rgba(0,0,0,0.06)" stroke-width="0.5">
  <line x1="80" y1="80" x2="480" y2="80"/>
  <line x1="80" y1="160" x2="480" y2="160"/>
  <line x1="80" y1="240" x2="480" y2="240"/>
  <line x1="80" y1="320" x2="480" y2="320"/>
  <line x1="80" y1="400" x2="480" y2="400"/>
  <line x1="160" y1="80" x2="160" y2="480"/>
  <line x1="240" y1="80" x2="240" y2="480"/>
  <line x1="320" y1="80" x2="320" y2="480"/>
  <line x1="400" y1="80" x2="400" y2="480"/>
</g>

<line x1="80" y1="80" x2="80" y2="480" stroke="#333" stroke-width="1.5"/>
<line x1="80" y1="480" x2="480" y2="480" stroke="#333" stroke-width="1.5"/>

<text x="490" y="486" font-size="16" font-style="italic" font-weight="600" fill="#333">q<tspan baseline-shift="sub" font-size="0.72em">x</tspan></text>
<text x="74" y="78" font-size="16" font-style="italic" font-weight="600" fill="#333" text-anchor="end">q<tspan baseline-shift="sub" font-size="0.72em">y</tspan></text>
<text x="74" y="495" font-size="12" fill="#666" text-anchor="end">O</text>



<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.05;1" values="0;1;1"/>
  <line x1="80" y1="160" x2="400" y2="480" stroke="#2c5fa6" stroke-width="2.5"/>
  <text x="390" y="470" font-size="13" font-weight="600" fill="#2c5fa6">予算線</text>
</g>

<text x="74" y="164" font-size="12" font-weight="700" fill="#2c5fa6" text-anchor="end" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.05;1" values="0;1;1"/>
  m
</text>

