<text font-size="13" font-weight="600" fill="#c44040" opacity="0" x="350" y="340">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;1" values="0;1;1"/>
  無差別曲線 u(x,y)
</text>

<text font-size="12" font-weight="700" fill="#c44040" opacity="0" x="132" y="92">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;1" values="0;1;1"/>
  <animate attributeName="x" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.125;0.292;0.375;0.500;0.583;0.708;0.792;1"
           values="132;132;132;144;144;164;164;148;148"/>
  u
</text>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;1" values="0;1;0;0"/>
  <circle cx="160" cy="240" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
  <circle cx="320" cy="400" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
  <text x="166" y="234" font-size="11" font-weight="600" fill="#a86610">交点</text>
  <text x="326" y="394" font-size="11" font-weight="600" fill="#a86610">交点</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.375;0.500;1" values="0;1;0;0"/>
  <circle cx="200" cy="280" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
  <circle cx="280" cy="360" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
</g>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.583;0.708;1" values="0;1;0;0"/>
  <text x="260" y="270" font-size="14" font-weight="700" fill="#b03030">予算オーバー</text>
  <text x="260" y="288" font-size="11" fill="#b03030">（この効用水準は予算内で達成不可）</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.708;0.792;1" values="0;0;1;1"/>
  <line x1="240" y1="480" x2="240" y2="320" stroke="#1a7a3a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="80" y1="320" x2="240" y2="320" stroke="#1a7a3a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <circle cx="240" cy="320" r="6.5" fill="#1a7a3a" stroke="#fff" stroke-width="2"/>
  <text x="252" y="312" font-size="13" font-weight="700" fill="#1a7a3a">効用最大化点</text>
  <text x="252" y="328" font-size="11" fill="#1a7a3a">(x*, y*)</text>
</g>

</svg>
