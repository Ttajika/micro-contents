<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" style="font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">
<!-- GSP（一般化2位価格）オークションの静止図：検索結果ページの広告枠と入札額の対応
     入札額順に上の枠から割当，支払いは1つ下の順位の入札額（11.1節） -->

<!-- ===== 検索結果ページのモック（左） ===== -->
<rect x="40" y="46" width="300" height="350" rx="10" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
<rect x="40" y="46" width="300" height="26" rx="10" fill="#eee" stroke="#bbb" stroke-width="1.5"/>
<rect x="40" y="60" width="300" height="12" fill="#eee"/>
<circle cx="56" cy="59" r="4" fill="#d66"/><circle cx="70" cy="59" r="4" fill="#dca94a"/><circle cx="84" cy="59" r="4" fill="#7cba61"/>
<!-- 検索ボックス -->
<rect x="58" y="84" width="240" height="28" rx="14" fill="#fff" stroke="#999" stroke-width="1.2"/>
<text x="74" y="103" fill="#555" font-size="13">ケーキ 通販</text>
<circle cx="281" cy="98" r="7" fill="none" stroke="#888" stroke-width="1.8"/>
<line x1="286" y1="103" x2="292" y2="109" stroke="#888" stroke-width="1.8"/>

<!-- 広告枠1（いちばん上） -->
<rect x="58" y="126" width="264" height="58" rx="6" fill="#fdf6e3" stroke="#d0c08a" stroke-width="1.2"/>
<rect x="66" y="134" width="34" height="16" rx="3" fill="none" stroke="#2a8a3e" stroke-width="1"/>
<text x="83" y="146" text-anchor="middle" fill="#2a8a3e" font-size="10">広告</text>
<text x="108" y="147" fill="#1a3c6e" font-size="14" font-weight="700">A社のケーキ</text>
<text x="66" y="172" fill="#a0522d" font-size="12">クリック単価＝B社の入札額 200円</text>

<!-- 広告枠2 -->
<rect x="58" y="194" width="264" height="58" rx="6" fill="#fdf6e3" stroke="#d0c08a" stroke-width="1.2"/>
<rect x="66" y="202" width="34" height="16" rx="3" fill="none" stroke="#2a8a3e" stroke-width="1"/>
<text x="83" y="214" text-anchor="middle" fill="#2a8a3e" font-size="10">広告</text>
<text x="108" y="215" fill="#1a3c6e" font-size="14" font-weight="700">B社のケーキ</text>
<text x="66" y="240" fill="#a0522d" font-size="12">クリック単価＝C社の入札額 100円</text>

<!-- 広告枠3 -->
<rect x="58" y="262" width="264" height="58" rx="6" fill="#fdf6e3" stroke="#d0c08a" stroke-width="1.2"/>
<rect x="66" y="270" width="34" height="16" rx="3" fill="none" stroke="#2a8a3e" stroke-width="1"/>
<text x="83" y="282" text-anchor="middle" fill="#2a8a3e" font-size="10">広告</text>
<text x="108" y="283" fill="#1a3c6e" font-size="14" font-weight="700">C社のケーキ</text>
<text x="66" y="308" fill="#a0522d" font-size="12">クリック単価＝D社の入札額 50円</text>

<!-- 通常の検索結果（グレーの行） -->
<text x="58" y="342" fill="#999" font-size="11">通常の検索結果</text>
<rect x="58" y="350" width="220" height="7" rx="3" fill="#ddd"/>
<rect x="58" y="363" width="250" height="7" rx="3" fill="#e6e6e6"/>
<rect x="58" y="376" width="190" height="7" rx="3" fill="#eee"/>

<!-- ===== 「上ほどクリックされやすい」注釈（モックの左） ===== -->
<line x1="26" y1="316" x2="26" y2="146" stroke="#888" stroke-width="1.6"/>
<polygon points="26,138 21,150 31,150" fill="#888"/>
<text x="13" y="234" text-anchor="middle" fill="#666" font-size="12" transform="rotate(-90,13,234)">上の枠ほどクリックされやすい</text>

<!-- ===== 広告主の入札（右） ===== -->
<text x="470" y="70" fill="#333" font-size="15" font-weight="700">広告主の入札額</text>
<text x="470" y="88" fill="#888" font-size="11">（1クリックあたり，高い順）</text>

<rect x="470" y="126" width="200" height="44" rx="8" fill="#eef2f7" stroke="#1a3c6e" stroke-width="1.4"/>
<text x="486" y="153" fill="#1a3c6e" font-size="14" font-weight="700">A社</text>
<text x="654" y="153" text-anchor="end" fill="#333" font-size="14">300円</text>

<rect x="470" y="194" width="200" height="44" rx="8" fill="#eef2f7" stroke="#1a3c6e" stroke-width="1.4"/>
<text x="486" y="221" fill="#1a3c6e" font-size="14" font-weight="700">B社</text>
<text x="654" y="221" text-anchor="end" fill="#333" font-size="14">200円</text>

<rect x="470" y="262" width="200" height="44" rx="8" fill="#eef2f7" stroke="#1a3c6e" stroke-width="1.4"/>
<text x="486" y="289" fill="#1a3c6e" font-size="14" font-weight="700">C社</text>
<text x="654" y="289" text-anchor="end" fill="#333" font-size="14">100円</text>

<rect x="470" y="330" width="200" height="44" rx="8" fill="#f4f4f4" stroke="#aaa" stroke-width="1.2"/>
<text x="486" y="357" fill="#888" font-size="14" font-weight="700">D社</text>
<text x="654" y="357" text-anchor="end" fill="#888" font-size="14">50円</text>
<text x="570" y="392" text-anchor="middle" fill="#999" font-size="12">D社は枠が取れない</text>

<!-- 割当の矢印（入札額の高い順に上の枠から） -->
<defs>
  <marker id="gspArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1a3c6e"/></marker>
</defs>
<line x1="466" y1="148" x2="348" y2="153" stroke="#1a3c6e" stroke-width="2" marker-end="url(#gspArr)"/>
<line x1="466" y1="216" x2="348" y2="221" stroke="#1a3c6e" stroke-width="2" marker-end="url(#gspArr)"/>
<line x1="466" y1="284" x2="348" y2="289" stroke="#1a3c6e" stroke-width="2" marker-end="url(#gspArr)"/>

<!-- ===== 下部の説明 ===== -->
<text x="40" y="420" fill="#555" font-size="13">入札額の高い順に上の枠から割り当て．支払うのは自分の入札額ではなく「1つ下の順位の入札額」</text>
</svg>
