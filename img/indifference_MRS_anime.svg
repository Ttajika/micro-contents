</defs>
<rect x="0" y="0" width="600" height="492" fill="#fafbfc"/>
<rect x="24" y="14" width="552" height="54" rx="8" fill="#eef4fb" stroke="#d8e3f0"/>
<rect x="24" y="14" width="4" height="54" fill="#3568d6"/>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.0001;0.0060;0.1217;0.1277;1.0000" values="0.0000;0.0000;1.0000;1.0000;0.0000;0.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >青い曲線は無差別曲線で，曲線上はどこも効用が等しい．</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >まず点 A と，A での接線（緑）を引く．</text></g>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.1277;0.1337;0.2493;0.2553;1.0000" values="0.0000;0.0000;1.0000;1.0000;0.0000;0.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >点 A から，財 x の消費量を 1 だけ増やす</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >（右へ 1 動いた点）．</text></g>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.2553;0.2613;0.3983;0.4043;1.0000" values="0.0000;0.0000;1.0000;1.0000;0.0000;0.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >効用を保つには，その分 y を減らして曲線上の点 B に戻る．</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >この下がった量が「犠牲にする y」である．</text></g>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.4043;0.4103;0.5259;0.5319;1.0000" values="0.0000;0.0000;1.0000;1.0000;0.0000;0.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >A と B を結ぶと線分 AB．その傾きの大きさが，</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >x を 1 増やすとき犠牲にする y の量を表す．</text></g>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.5319;0.5379;0.6536;0.6596;1.0000" values="0.0000;0.0000;1.0000;1.0000;0.0000;0.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >限界代替率 MRS とは，x を増やす量をごく小さく</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >したときに犠牲にする y の量のことである．</text></g>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.6596;0.6656;0.8451;0.8511;1.0000" values="0.0000;0.0000;1.0000;1.0000;0.0000;0.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >x を増やす量 Δx をだんだん 0 に近づける．すると</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >線分 AB は A での接線にどんどん重なっていく．</text></g>
<g opacity="0" ><animate attributeName="opacity" dur="47s" repeatCount="indefinite" keyTimes="0.0000;0.8511;0.8571;1.0000" values="0.0000;0.0000;1.0000;1.0000"/><text x="40.00" y="38.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >Δx を 0 にした極限で，線分 AB は接線に一致する．</text><text x="40.00" y="58.00" fill="#27313d" font-size="13.5" font-weight="500" text-anchor="start" >つまり A での接線の傾きの大きさが MRS である．</text></g>
