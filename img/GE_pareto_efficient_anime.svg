<text x="285.0" y="112.0" font-size="11.5" fill="#c0392b" text-anchor="middle">← ケネスの<tspan font-style="italic">q</tspan><tspan font-style="italic" baseline-shift="sub" font-size="0.72em">x</tspan></text>
<text x="488.0" y="274.0" font-size="11.5" fill="#c0392b" text-anchor="middle" transform="rotate(90 488.0 274.0)">ケネスの<tspan font-style="italic">q</tspan><tspan font-style="italic" baseline-shift="sub" font-size="0.72em">y</tspan> →</text>
</g>
