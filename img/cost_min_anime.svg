<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" style="font-family:-apple-system,BlinkMacSystemFont,sans-serif">

<rect x="0" y="0" width="600" height="540" fill="#fafbfc"/>

<rect x="30" y="14" width="540" height="56" rx="8" fill="#eef3f9" stroke="#dde3eb" stroke-width="1"/>

<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="1;0;0;0;0;0"/>
  等産出量曲線：同じ産出量を達成する L と K の組み合わせ
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;1;0;0;0;0"/>
  等費用曲線 wL + rK = c．交点で生産すれば q を達成しつつ費用 c
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;0;1;0;0;0"/>
  左下にずらすと費用が下がる（まだ交点があり q を達成可能）
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;0;0;1;0;0"/>
  下げすぎ：等費用曲線が等産出量曲線と交わらず q を達成できない
</text>
<text x="300" y="48" text-anchor="middle" font-size="14" fill="#333" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;0.500;0.708;1"
           values="0;0;0;0;1;1"/>
  接点に戻る．ここで費用が最小になる（費用最小化点）
</text>

<g stroke="rgba(0,0,0,0.06)" stroke-width="0.5">
  <line x1="80" y1="80" x2="480" y2="80"/>
  <line x1="80" y1="160" x2="480" y2="160"/>
  <line x1="80" y1="240" x2="480" y2="240"/>
  <line x1="80" y1="320" x2="480" y2="320"/>
  <line x1="80" y1="400" x2="480" y2="400"/>
  <line x1="160" y1="80" x2="160" y2="480"/>
  <line x1="240" y1="80" x2="240" y2="480"/>
  <line x1="320" y1="80" x2="320" y2="480"/>
  <line x1="400" y1="80" x2="400" y2="480"/>
</g>

<line x1="80" y1="80" x2="80" y2="480" stroke="#333" stroke-width="1.5"/>
<line x1="80" y1="480" x2="480" y2="480" stroke="#333" stroke-width="1.5"/>

<text x="490" y="486" font-size="16" font-style="italic" font-weight="600" fill="#333">L</text>
<text x="74" y="78" font-size="16" font-style="italic" font-weight="600" fill="#333" text-anchor="end">K</text>
<text x="74" y="495" font-size="12" fill="#666" text-anchor="end">O</text>



<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.05;1" values="0;1;1"/>
  <polyline points="144,80 160,160 176,213.33 192,251.43 208,280 224,302.22 240,320 256,334.55 272,346.67 288,356.92 304,365.71 320,373.33 336,380 352,385.88 368,391.11 384,395.79 400,400 416,403.81 432,407.27 448,410.43 464,413.33 480,416" fill="none" stroke="#c44040" stroke-width="2.5"/>
  <text x="380" y="370" font-size="13" font-weight="600" fill="#c44040">等産出量曲線 f(L,K)=q</text>
</g>

<line x1="80" y1="80" x2="480" y2="480" stroke="#2c5fa6" stroke-width="2.5" opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.115;0.125;1" values="0;0;1;1"/>
  <animate attributeName="y1" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.125;0.292;0.375;0.500;0.583;0.708;0.792;1"
           values="80;80;80;120;120;240;240;160;160"/>
  <animate attributeName="x2" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.125;0.292;0.375;0.500;0.583;0.708;0.792;1"
           values="480;480;480;440;440;320;320;400;400"/>
</line>

<text font-size="12" font-weight="700" fill="#2c5fa6" text-anchor="end" opacity="0" x="74" y="84">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;1" values="0;1;1"/>
  <animate attributeName="y" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.125;0.292;0.375;0.500;0.583;0.708;0.792;1"
           values="84;84;84;124;124;244;244;164;164"/>
  c
</text>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.125;0.292;1" values="0;1;0;0"/>
  <circle cx="160" cy="160" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
  <circle cx="400" cy="400" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
  <text x="166" y="154" font-size="11" font-weight="600" fill="#a86610">交点</text>
  <text x="406" y="394" font-size="11" font-weight="600" fill="#a86610">交点</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.375;0.500;1" values="0;1;0;0"/>
  <circle cx="177.5" cy="217.5" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
  <circle cx="342.5" cy="382.5" r="5" fill="#e89530" stroke="#fff" stroke-width="1.5"/>
</g>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="discrete"
           keyTimes="0;0.583;0.708;1" values="0;1;0;0"/>
  <text x="260" y="270" font-size="14" font-weight="700" fill="#b03030">交点なし</text>
  <text x="260" y="288" font-size="11" fill="#b03030">（q を達成する (L,K) が存在しない）</text>
</g>

<g opacity="0">
  <animate attributeName="opacity" dur="24s" repeatCount="indefinite" calcMode="linear"
           keyTimes="0;0.708;0.792;1" values="0;0;1;1"/>
  <line x1="240" y1="480" x2="240" y2="320" stroke="#1a7a3a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="80" y1="320" x2="240" y2="320" stroke="#1a7a3a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <circle cx="240" cy="320" r="6.5" fill="#1a7a3a" stroke="#fff" stroke-width="2"/>
  <text x="252" y="312" font-size="13" font-weight="700" fill="#1a7a3a">費用最小化点</text>
  <text x="252" y="328" font-size="11" fill="#1a7a3a">(L*, K*)</text>
</g>

</svg>
