<text x="290" y="30" text-anchor="middle" font-size="14" fill="#222" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.0700;0.0750;0.1700;0.1750;1.0000" values="0;0;1;1;0;0"/>② x の価格が上昇：予算線が青→赤へ回転（最適点は B へ）</text>
<text x="290" y="50" text-anchor="middle" font-size="13" fill="#555" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.0700;0.0750;0.1700;0.1750;1.0000" values="0;0;1;1;0;0"/>粗補完財：y の消費も減る（B は A より下）</text>
<text x="290" y="30" text-anchor="middle" font-size="14" fill="#222" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.1700;0.1750;0.2700;0.2750;1.0000" values="0;0;1;1;0;0"/>③ この価格効果 A→B を，代替効果と所得効果に分解する</text>
<text x="290" y="30" text-anchor="middle" font-size="14" fill="#222" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.2700;0.2750;0.4200;0.4250;1.0000" values="0;0;1;1;0;0"/>④ まず所得を補償：赤→緑へ平行シフトし，元の効用 U₁ 上の点 C へ</text>
<text x="290" y="30" text-anchor="middle" font-size="14" fill="#222" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.4200;0.4250;0.6700;0.6750;0.8900;0.8950;1.0000" values="0;0;1;1;0;0;1;1"/>⑤ スルツキー分解の完成</text>
<text x="290" y="50" text-anchor="middle" font-size="13" fill="#555" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.4200;0.4250;0.6700;0.6750;0.8900;0.8950;1.0000" values="0;0;1;1;0;0;1;1"/>A→C：代替効果（U₁ 上）／ C→B：所得効果（U₁→U₂）</text>
<text x="290" y="30" text-anchor="middle" font-size="14" fill="#222" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.6700;0.6750;0.7800;0.7850;1.0000" values="0;0;1;1;0;0"/>⑥ 代替効果：効用 U₁ を保ったまま，無差別曲線に沿って A → C</text>
<text x="290" y="30" text-anchor="middle" font-size="14" fill="#222" opacity="0"><animate attributeName="opacity" dur="42s" repeatCount="indefinite" keyTimes="0.0000;0.7800;0.7850;0.8900;0.8950;1.0000" values="0;0;1;1;0;0"/>⑦ 所得効果：予算線を平行にシフトして C → B（U₁ → U₂）</text>
